# Default Project Configuration
# Every parameter here can be overridden per-project via the GUI.
# Values reflect typical defaults for Indian crude/LPG pipelines (ASME B31.4 / B31.8 jurisdictions).

# ============================================================================
# PROJECT METADATA (set per-project; these are placeholders)
# ============================================================================

project:
  project_name: ""                          # e.g. "FFP_HMEL_IPS1_to_IPS2"
  pipeline_name: ""                         # e.g. "IPS-1 to IPS-2"
  client_name: ""                           # e.g. "HPCL-Mittal Pipelines Limited"
  report_number: ""                         # client's tracking number
  report_revision: "00"                     # bump on each revision
  prepared_by: ""
  reviewed_by: ""
  approved_by: ""

# ============================================================================
# PIPELINE PHYSICAL PROPERTIES
# ============================================================================

pipeline:
  diameter_mm: 0.0                          # OD in mm (273, 711, etc.)
  length_km: 0.0                            # total length
  install_year: 2011
  material_grade: "API 5L X70"              # API 5L X42/X52/X60/X65/X70/X80
  smys_mpa: 482                             # auto-derive from grade if 0
  product: "crude oil"                      # crude oil | refined product | LPG | natural gas | water
  service_class: "liquid"                   # liquid | gas — affects which B31 code applies
  
  # SMYS lookup table (used if smys_mpa is 0 — auto-derive from grade)
  smys_lookup:
    "API 5L X42": 290
    "API 5L X46": 317
    "API 5L X52": 358
    "API 5L X56": 386
    "API 5L X60": 414
    "API 5L X65": 448
    "API 5L X70": 482
    "API 5L X80": 552

# ============================================================================
# MAOP ZONES (WT-based, per the convention confirmed by user)
# ============================================================================
# Each zone maps a wall-thickness range to a design factor and MAOP.
# Pipeline-wide single MAOP: enter one zone covering all WTs.
# Multi-zone (HMEL-style): enter multiple zones, each tied to its WT.

maop_zones:
  # Example single-MAOP case (GAIL Kandla-Samakhiali style):
  # - wt_mm_min: 6.4
  #   wt_mm_max: 7.1
  #   design_factor: 0.72
  #   maop_kgcm2: 70.0
  
  # Example multi-MAOP case (HMEL IPS-1 to IPS-2 style):
  # - wt_mm_min: 8.7
  #   wt_mm_max: 9.5
  #   design_factor: 0.72
  #   maop_kgcm2: 96.7
  # - wt_mm_min: 10.3
  #   wt_mm_max: 11.1
  #   design_factor: 0.60
  #   maop_kgcm2: 84.1
  # - wt_mm_min: 11.9
  #   wt_mm_max: 14.3
  #   design_factor: 0.50
  #   maop_kgcm2: 80.6
  
  []                                        # populated by GUI / project file

# ============================================================================
# ILI RUN METADATA
# ============================================================================

runs:
  run_1:
    file_path: ""
    inspection_date: ""                     # ISO 8601 YYYY-MM-DD
    vendor: ""                              # e.g. "Athena PowerTech LLP / NGP"
    tool_type: "MFL-A"                      # MFL-A | MFL-C | EMAT | UT | combined string
    tool_serial: ""
    notes: ""
  
  run_2:
    file_path: ""
    inspection_date: ""
    vendor: ""
    tool_type: ""
    tool_serial: ""
    notes: ""

# ============================================================================
# DEFECT MATCHING PARAMETERS
# ============================================================================
# The defaults are conservative starting points that work for most cases.
# Tighten for cleaner data (e.g. same vendor, short interval).
# Loosen if match rate is below target.

matching:
  # Direction: which run is "old"?
  # "old_to_new" = for each old defect, find a new-run match (recommended)
  direction: "old_to_new"
  
  # Tolerance windows for candidate selection within a matched joint
  distance_tolerance_m: 0.10                # axial position drift allowed
  clock_tolerance_hours: 0.5                # ±0:30 (decimal hours)
  
  # Depth sanity: corrosion shouldn't shrink physically.
  # Allow apparent shrinkage up to this much (in WT %), attributing it to tool tolerance.
  # MFL-A typical: ±10% WT at 80% confidence.
  depth_shrinkage_tolerance_pct_wt: 10.0
  
  # Surface side matching policy
  require_surface_match: true               # if true: int defects only match int candidates
  flag_surface_mismatch: true               # if false-positive: still match but flag for QA
  
  # Hungarian assignment within each joint
  use_hungarian_assignment: true            # one-to-one optimal pairing
  
  # Score weights (used to rank candidates before Hungarian)
  # Must sum to 1.0
  weights:
    distance: 0.35
    clock: 0.25
    depth: 0.20
    dimension_class: 0.10                   # bonus for matching dimension class (PITT-PITT etc.)
    feature_type: 0.10                      # bonus for matching feature identification

  # Iterative relaxation when target match rate not hit
  target_match_rate: 0.90                   # 90% of old-run defects should match
  enable_relaxation: true
  relaxation_schedule:
    # Each step multiplies tolerances by these factors
    - {step: 1, distance_mult: 1.5, clock_mult: 1.5, depth_mult: 1.5}
    - {step: 2, distance_mult: 2.0, clock_mult: 2.0, depth_mult: 2.0}
    - {step: 3, distance_mult: 3.0, clock_mult: 3.0, depth_mult: 3.0}
  
  # Cluster awareness: when both runs report a cluster covering the same region,
  # match cluster-to-cluster even if individual feature counts differ.
  cluster_aware_matching: true

  # Defect-matcher specifics — consumed by src/core/defect_matcher.py.
  # Each pass operates on whatever's still unmatched from the previous pass;
  # tolerances widen so easy matches lock in first.
  defect_matcher:
    distance_metric:
      axial_weight: 1.0                       # cost per metre of axial drift
      clock_weight: 0.3                       # cost per hour of clock drift
      surface_mismatch_penalty: 10.0          # ~forbids cross-surface pairing
      depth_shrinkage_penalty: 1.0            # added when run2 < 0.5 * run1
      depth_shrinkage_ratio: 0.5
      cluster_type_mismatch_penalty: 0.2      # cluster-parent vs standalone
    passes:
      - {axial_tolerance_m: 0.10, clock_tolerance_h: 0.5, max_cost: 0.5}
      - {axial_tolerance_m: 0.25, clock_tolerance_h: 1.0, max_cost: 1.0}
      - {axial_tolerance_m: 1.00, clock_tolerance_h: 1.5, max_cost: 1.5}

# ============================================================================
# JOINT ALIGNMENT
# ============================================================================

joint_alignment:
  # Sequence alignment on joint length signatures
  algorithm: "needleman_wunsch"
  length_match_tolerance_m: 0.10            # joints within this length diff = match
  gap_penalty: 0.5                          # cost of inserting/deleting a joint
  
  # Use absolute distance as a secondary cue for joint alignment
  use_distance_cross_check: true
  max_cumulative_drift_m: 50.0              # warn if total drift exceeds this

# ============================================================================
# CORROSION GROWTH RATE
# ============================================================================

cgr:
  # Mode selection — confirmed by user as project-dependent
  mode: "feature_specific"                  # feature_specific | hybrid | population_only
  
  # In all modes: floor negative growth at zero (corrosion can't physically shrink)
  floor_negative_at_zero: true
  
  # In feature_specific mode:
  # CGR_used = max(0, (depth_new_mm - depth_old_mm) / years_between)
  
  # In hybrid mode (GAIL Kandla-Samakhiali style):
  # CGR_used = max(feature_CGR, population_quantile_CGR)
  # Population quantiles computed separately for internal vs external.
  hybrid:
    population_quantile: 0.95               # 95th percentile = "upper bound"
    split_by_surface: true                  # separate floors for int / ext
  
  # Tool tolerance flag — informational, doesn't change CGR
  flag_below_tool_tolerance:
    enabled: true
    # MFL depth tolerance per POF (typical): ±10% WT
    tool_depth_tolerance_pct_wt: 10.0
    # Below this CGR threshold, growth is statistically indistinguishable from noise
    # Threshold = (2 * tolerance_pct * avg_WT) / years_between
    # Computed at runtime based on actual interval and WT.
  
  # Handling of features in run 2 with no run 1 match
  # Per GAIL Kandla-Samakhiali: assume depth = tool detection threshold in run 1
  unmatched_new_feature_handling:
    strategy: "assume_threshold"            # assume_threshold | exclude | half_life
    assumed_depth_pct_wt: 10.0              # POF MFL detection threshold

# ============================================================================
# CLUSTERING (defect interaction)
# ============================================================================

clustering:
  # Most projects accept vendor clustering. Re-cluster only when requested.
  reclustering_enabled: false
  
  # If enabled:
  interaction_rule: "B31G"                  # B31G (3t) | DNV (6t) | Kastner | custom
  interaction_multiplier_t: 3.0             # used if rule = "custom" or as B31G/DNV override
  
  # Cluster bounding box aggregation
  cluster_length_method: "envelope"         # envelope (max extent) | weighted_avg
  cluster_depth_method: "max"               # max | weighted_avg | rstreng_effective_area

# ============================================================================
# FITNESS-FOR-PURPOSE (FFP)
# ============================================================================

ffp:
  # Primary FFP method for the main report and Annexure F repair predictions
  primary_method: "B31G_Modified"           # B31G_Original | B31G_Modified | RSTRENG | DNV_RP_F101
  
  # Additional methods to compute for cross-check tables
  cross_check_methods:
    - "B31G_Original"
    # - "RSTRENG"
    # - "DNV_RP_F101"
  
  # Run Kastner separately for circumferentially-oriented defects
  # (CISL / CIGR dimension classes)
  kastner_for_circumferential: true
  kastner_variant: "original"               # original | modified_with_n2
  
  # Flow stress definition
  flow_stress:
    b31g_original: "1.1 * SMYS"
    b31g_modified: "SMYS + 69 MPa"          # = SMYS + 10 ksi
    rstreng: "SMYS + 69 MPa"
    dnv_rp_f101: "UTS"                      # uses ultimate tensile strength
  
  # Safety factor: SF = 1 / design_factor
  # SOP = Pf / SF
  # ERF = MAOP / SOP   (confirmed convention — user clarified)

# ============================================================================
# ERF BANDS & ACTION THRESHOLDS
# ============================================================================

erf_bands:
  # Convention: ERF = MAOP / Psafe (high ERF = bad)
  convention: "MAOP_over_Psafe"
  
  # Action thresholds (project-dependent, user confirmed range 0.80-1.00)
  bands:
    - {min: 0.00,  max: 0.85, label: "Acceptable",          color: "#00A86B"}
    - {min: 0.85,  max: 0.90, label: "Monitor",             color: "#FFB347"}
    - {min: 0.90,  max: 0.95, label: "Planned repair",      color: "#FF8C00"}
    - {min: 0.95,  max: 1.00, label: "Urgent repair",       color: "#DC143C"}
    - {min: 1.00,  max: 99.0, label: "Immediate repair",    color: "#8B0000"}
  
  # Repair trigger (used for "predicted repair date")
  repair_trigger_erf: 1.00                  # default; some projects use 0.95 or 0.90

# ============================================================================
# REPAIR PREDICTION
# ============================================================================

repair_prediction:
  # Look-ahead horizon
  horizon_years: 10                         # standard 10-year window
  # Use a specific assessment end date instead of computing from horizon:
  assessment_end_date: ""                   # ISO YYYY-MM-DD; if blank, computed from horizon
  
  # Stop conditions (whichever fires first determines repair date)
  triggers:
    - {type: "depth_pct_wt_ge", value: 80.0, label: "Critical depth"}
    - {type: "erf_ge",          value: 1.00, label: "Insufficient pressure capacity"}
  
  # If feature doesn't trigger within horizon, label it:
  beyond_horizon_label: "After {end_date}"

# ============================================================================
# REPORT OUTPUT
# ============================================================================

reports:
  # Format style: which output structure does the client expect?
  # "annexure_EF" = single Annexure E (matched + CGR) + Annexure F (repair predictions)
  # "annexure_BCD" = Annexure B (matched), Annexure C (B31G ERF table), Annexure D (Kastner ERF table)
  style: "annexure_EF"
  
  # Output products
  generate_annexures_xlsx: true
  generate_main_report_docx: true
  generate_pdf_compile: true                # requires LibreOffice or MS Word
  
  # Embedded charts in main report
  charts:
    cgr_histogram: true
    depth_vs_chainage: true
    erf_distribution: true
    matched_unmatched_summary: true
    orientation_rose: true
  
  # File naming
  output_dir: "./output"
  filename_pattern: "FFP_{client}_{pipeline}_{report_number}_r{revision}.{ext}"

# ============================================================================
# QA FLAGS
# ============================================================================

qa:
  # Acceptable bounding box for ILI coordinates. The reader uses these to
  # (a) detect lat/lon swapped at source and auto-correct (emits
  #     COORDINATES_SWAPPED) and (b) flag values that don't fall in either
  #     orientation (LAT_LON_OUT_OF_BOUNDS).
  # Defaults cover the Indian subcontinent (~Cape Comorin to mid-Himalaya,
  # Gujarat coast to Arunachal). Override per project if a pipeline runs
  # outside this box (joint ventures abroad, etc.).
  coordinate_bounds:
    lat: [6.0, 38.0]
    lon: [68.0, 98.0]

  # Which flags to include in the QA review table
  flag_surface_mismatch: true
  flag_high_relaxation: true                # matched only after tolerance relaxation
  flag_large_clock_drift: true              # drift > 50% of tolerance
  flag_large_distance_drift: true
  flag_depth_shrinkage: true                # apparent depth decrease beyond tolerance
  flag_below_tool_tolerance: true
  flag_population_floor_applied: true       # hybrid CGR: feature CGR < population P95
  flag_unmatched_run2_feature: true         # new defect with assumed run-1 threshold depth
  flag_high_cgr: true
  high_cgr_threshold_mm_per_year: 0.20

# ============================================================================
# AUDIT TRAIL
# ============================================================================

audit:
  # Embed full provenance in every output file
  record_tool_version: true
  record_git_commit: true
  record_input_file_hashes: true
  record_all_parameters: true
  record_run_timestamp: true
  embed_in_xlsx_meta_sheet: true            # adds "About" sheet to every workbook
  embed_in_docx_properties: true            # uses DOCX core properties
