    - "erf (b31g)"                          # NGP multi-sheet, 1ZSV
    - "erf (mod. b31g)"                     # NGP multi-sheet, 1YCF
    - "erf asme b31g"
    - "erf asme b-31g"
    - "erf asme b-31g original"             # GAIL Samakhiali Annexure C
    - "erf b31g"
    - "erf asme b31g modified"
    - "erf        asme b31g"                # Athena 2018 (multiple spaces)

psafe:
  # Vendor-pre-computed safe operating pressure
  synonyms:
    - "psafe"
    - "psafe, kg/cm2"                       # NGP multi-sheet
    - "psafe, kg/cm²"
    - "psafe asme b31g, (kg/cm²)"
    - "psafe asme b-31g, (kg/cm²)"
    - "psafe kg/cm2"
    - "p safe"
    - "sop"
    - "sop (kg/cm2)"
    - "sop (kg/cm2)- asme b-31g original"   # GAIL Samakhiali
    - "sop (kg/cm2)- kastner approach"      # GAIL Samakhiali

