# ============================================================================
# ENUMERATED VALUES — NORMALISATION RULES
# ============================================================================

value_normalisations:
  surface:
    internal: ["int", "int.", "internal", "i", "in", "inner"]
    external: ["ext", "ext.", "external", "e", "ex", "outer", "out"]
    midwall:  ["mid", "midwall", "m", "mw"]
    unknown:  ["", "n/a", "na", "undefined", "unk", "?"]

  feature_identification:
    # Map free-text vendor descriptions to canonical POF codes.
    # Reader applies these BEFORE constructing the FeatureIdentification enum.
    CORR:                                    # corrosion (single feature)
      - "corr"
      - "corrosion"
      - "metal loss"
      - "metal loss (grouped)"
      - "metal loss adj. gw"
      - "metal loss adj. sw"
      - "metal loss adj. lw"
      - "pitting"
      - "pinhole"
      - "general corrosion"
      - "axial grooving"
      - "axial slotting"
      - "circumferential grooving"
      - "circumferential slotting"
      - "circum. grooving"
      - "circum. slotting"
    COCL:                                    # corrosion cluster (parent row)
      - "cocl"
      - "corrosion cluster"
      - "corrosion cluster adj. sw"
      - "corrosion cluster adj. gw"
      - "corrosion cluster adj. gw/sw"
      - "corrosion cluster adj. lw"
    MIAN:                                    # manufacturing / mill anomaly
      - "mian"
      - "mill"
      - "mill anomaly"
      - "mill fault"
      - "manufacturing"
      - "mfg"
      - "manufacturing anomaly"
    MIAC:                                    # manufacturing cluster
      - "miac"
      - "manufacturing cluster"
    DENT:
      # Map every dent variant the vendors emit to the single DENT code.
      # Dents are out of scope for B31G/RSTRENG; the reader drops them
      # via _NON_METAL_LOSS_FIDS at the end of the per-row parse.
      #
      # The Abu Road / 1ZYC PDF surfaced a missing variant ("Dent
      # complex" / DENC) which leaked into FFP and produced a bogus
      # ERF=8.57 because the 0.9 in the Depth column means 0.9% OD (a
      # dent thing) and the FFP engine assumed 90% WT. Make sure EVERY
      # commonly-seen vendor string for a dent ends up in this bucket.
      - "dent"
      - "denp"                              # POF: plain dent
      - "dent plain"
      - "plain dent"
      - "denk"                              # POF: kinked dent
      - "dent kinked"
      - "kinked dent"
      - "denc"                              # POF: dent w/ crack-like / complex
      - "dent complex"                      # NGP human label, 1ZYC 2023
      - "complex dent"
      - "dent with crack"
      - "dent with crack-like"
      - "dent with crack indication"
      - "dens"                              # POF: dent (other variant seen in some tallies)
      - "dend"                              # POF: dent dimple
      - "denb"                              # POF: dent / bump
      - "dent dimple"
      - "dent with additional feature"      # NGP description, 1ZYC 2023
      - "area of dent"
    DEML:
      - "deml"
      - "dent with metal loss"
      - "dent w/ metal loss"
      - "dent w/ ml"
    CRAC:
      - "crac"
      - "crack"
      - "crack-like"
      - "lwcr"                              # POF: long-weld crack-like
      - "longitudinal weld crack"
      - "longitudinal weld crack-like"
    GWAN:
      - "gwan"
      - "girth weld anomaly"
    SWAN:
      - "swan"
      - "spiral weld anomaly"
    LWAN:
      - "lwan"
      - "longitudinal weld anomaly"
    RIWR:
      # Ripple / wrinkle — a geometry deformation feature, NOT metal
      # loss. Like dents, ripples are out of scope for B31G/RSTRENG;
      # the reader drops them via _NON_METAL_LOSS_FIDS at the end of
      # the per-row parse so they stay in `run.features` (raw count)
      # but are excluded from features_for_assessment(). Surfaced on
      # the HPCL 1YCP listing, whose `Defects` sheet carries 7 RIWR
      # rows under POF Feature type "Anomaly" — without this mapping
      # they resolved to UNDEFINED and leaked into the FFP population.
      - "riwr"
      - "ripple/wrinkle"
      - "ripple / wrinkle"
      - "ripple/ wrinkle"
      - "ripple /wrinkle"
      - "ripple"
      - "wrinkle"

  dimension_class:
    # Map free-text dimension class to canonical POF codes.
    GENE:
      - "gene"
      - "general"
      - "general corrosion"
    PITT:
      - "pitt"
      - "pitting"
    PINH:
      - "pinh"
      - "pinhole"
    AXGR:
      - "axgr"
      - "axial grooving"
    AXSL:
      - "axsl"
      - "axial slotting"
    CIGR:
      - "cigr"
      - "circum. grooving"
      - "circumferential grooving"
    CISL:
      - "cisl"
      - "circum. slotting"
      - "circumferential slotting"

  cluster_child_markers:
    # Substrings (case-insensitive, after _norm) in the Description column
    # that identify a row as a CHILD of a cluster parent rather than a
    # standalone defect. Used by the reader to populate
    # Feature.cluster_parent_id so that ILIRun.features_for_assessment()
    # can exclude children from the FFP-relevant count (their parent COCL
    # row carries the assessed dimensions).
    - "grouped"
    - "in cluster"
    - "child"

  feature_type_anomaly:
    # Strings that mean "this row is an anomaly worth analysing"
    is_anomaly:
      - "anomaly"
      - "metal loss"
      - "metal loss (grouped)"
      - "metal loss adj. gw"
      - "metal loss adj. sw"
      - "metal loss adj. lw"
      - "corrosion"
      - "corrosion cluster"
      - "corrosion cluster adj. sw"
      - "corrosion cluster adj. gw"
      - "corrosion cluster adj. gw/sw"
      - "corrosion cluster adj. lw"
      - "pitting"
      - "pinhole"
      - "general corrosion"
      - "axial grooving"
      - "axial slotting"
      - "circumferential grooving"
      - "circumferential slotting"
      - "circum. grooving"
      - "circum. slotting"
      - "mfg"                               # manufacturing metal loss (Athena 2018)
      - "mill anomaly"
      - "mill fault"                        # may be excluded depending on policy
    
    # Strings that mean "skip this row, it's not a metal-loss anomaly"
    skip:
      - "weld"
      - "girth weld"
      - "longitudinal weld"
      - "spiral weld"
      - "valve"
      - "tee"
      - "t-piece"
      - "flange"
      - "joint flange"
      - "bend"
      - "casing"
      - "casing (start)"
      - "casing (end)"
      - "casing (start) (eccentric)"
      - "casing (end) (eccentric)"
      - "magnet"
      - "ball valve (center)"
      - "ball valve section"
      - "valve pipe"
      - "valve (stem)"
      - "spiral weld section"
      - "longitudinal weld section"
      - "data recording begin"
      - "data recording end"
      - "external support"
      - "support"
      - "attachment"
      - "offtake"
      - "off take"
      - "tap"
      - "pipeline fixture"
      - "spiral weld anomaly"               # depends on policy; default skip for ML analysis
      - "girth weld anomaly"
      - "dent"                              # dent assessed separately, not via B31G
      - "ripple"
      - "metal object"
      - "material anomaly"
      - "overlap"
      - "deposit"
      - "repair"
      - "sleeve"
      - "patch"

# ============================================================================
# CLOCK POSITION PARSING
# ============================================================================

clock_position_formats:
  # Internal storage is decimal hours, range [0.0, 12.0).
  # Wraparound: 11:30 + 1:00 = 0:30 (1 hour apart, not 11).
  
  # Format detectors (regex):
  hh_mm_string:
    pattern: '^(\d{1,2})[:.](\d{2})(?::(\d{2}))?$'      # "5:14", "05:14", "05:14:00"
    
  decimal_hours:
    # Bare number 0-12: treat as decimal hours
    range: [0.0, 12.0]
    
  decimal_degrees:
    # Bare number > 12 but <= 360: treat as degrees
    range: [12.001, 360.0]
    conversion: "degrees / 30.0"

  # 12:00 == 0:00 — normalise to 0.0
  normalise_12_to_0: true
